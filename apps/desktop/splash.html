<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; height: 100%; background: #14161a; color: #e6e8ec;
    font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden;
    display: flex; align-items: center; justify-content: center; }
  .box { text-align: center; }
  .logo { font-size: 34px; font-weight: 800; letter-spacing: -0.01em; }
  .logo span { color: #4f9cf9; }
  .bars { display: flex; gap: 5px; justify-content: center; margin: 22px 0; height: 34px; align-items: flex-end; }
  .bars i { width: 7px; border-radius: 3px; background: linear-gradient(#9d6ff2, #4f9cf9);
    animation: eq 1s ease-in-out infinite; }
  .bars i:nth-child(1) { animation-delay: 0s; } .bars i:nth-child(2) { animation-delay: .15s; }
  .bars i:nth-child(3) { animation-delay: .3s; } .bars i:nth-child(4) { animation-delay: .45s; }
  .bars i:nth-child(5) { animation-delay: .6s; }
  @keyframes eq { 0%,100% { height: 8px; } 50% { height: 32px; } }
  #status { color: #aab1bd; font-size: 12.5px; min-height: 34px; max-width: 400px; margin: 0 auto; }
</style>
</head>
<body>
  <div class="box">
    <div class="logo">mITy<span>Studio</span></div>
    <div class="bars"><i></i><i></i><i></i><i></i><i></i></div>
    <div id="status">Starting…</div>
  </div>
  <script>
    window.mity?.onStatus((t) => { document.getElementById('status').textContent = t })
  </script>
</body>
</html>
